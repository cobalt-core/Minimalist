Shape=Rectangle 50,95,230,69 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=58
Y=102
W=400
H=18
FontSize=5
Text=  X _

[meter]
