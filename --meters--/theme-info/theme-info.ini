[Rainmeter]
Update=1000
WindowX=-46
WindowY=366
ClickThrough=0
Draggable=0

[Metadata]
Name=Skin Deatils
Author=cobalt-core
Information=Shows details regarding current theme. Mainly color swatches.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
