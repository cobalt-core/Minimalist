[Rainmeter]
Update=1000

[Metadata]
Name=Monitor
Author=cobalt-core
Information=Shows number of monitors connected.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,107,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,107,70 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,107,70 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: number of monitors connected

[1]
Measure=SysInfo
SysInfoType=NUM_MONITORS

[Measure]
Meter=String
MeterStyle=styleText
MeasureName=1
X=5
Y=40
W=225
H=175
FontColor=#PALETTE4#
FontSize=7
FontFace=#FACE1#
Text=Monitor(s) :: [1]
MouseOverAction=[!SetOption Measure FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption Measure FontColor #PALETTE4#]

[2]
Measure=SysInfo
SysInfoType=WORK_AREA

[Measure2]
Meter=String
MeterStyle=styleText
MeasureName=2
X=5
Y=55
W=225
H=175
FontColor=#PALETTE4#
FontSize=7
FontFace=#FACE1#
Text=
MouseOverAction=[!SetOption Measure2 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption Measure2 FontColor #PALETTE4#]
