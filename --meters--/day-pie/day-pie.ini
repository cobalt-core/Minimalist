[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Day Pie
Author=cobalt-core
Information=Pie chart on how much day you spend, because pictorial data speaks more than words.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[Fill]
Meter=Shape
Shape=Rectangle 36,27,110,66 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 36,27,110,66 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[MeasureHours]
Measure=Time
Format=%H

[MeasureMinutes]
Measure=Time
Format=%M

[MeasureSeconds]
Measure=Time
Format=%S

[MeasureTotalSeconds]
Measure=Calc
Formula=(MeasureHours*3600)+(MeasureMinutes*60)+(MeasureSeconds)

[MeasureInPercent]
Measure=Calc
Formula=(MeasureTotalSeconds/86400)

[Circle]
Meter=Shape
Shape=Ellipse 70,60,30 | Fill Color #PALETTE2#,200 | Stroke Width 4 | Stroke Color #PALETTE5#
MouseOverAction=[!ShowMeterGroup A]
MouseLeaveAction=[!HideMeterGroup A]

[Circle3]
Meter=Shape
Shape=Ellipse 70,60,30 | Fill Color #PALETTE5# | Stroke Width 4 | Stroke Color #PALETTE5#
Hidden=1
Group=A

[MeterUsedDay]
Meter=Roundline
MeasureName=MeasureInPercent
X=10
Y=0
W=120
H=120
StartAngle=4.712
RotationAngle=-6.283
LineLength=30
LineColor=#PALETTE2#,100
Solid=1
AntiAlias=1
MouseOverAction=[!SetOption MeterUsedDay LineColor #PALETTE3#]
MouseLeaveAction=[!SetOption MeterUsedDay LineColor #PALETTE2#,200]

[Circle2]
Meter=Shape
Shape=Ellipse 70,60,30 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE4#

[meterLine]
Meter=String
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE4#
Text=DAY#CRLF#LEFT
X=110
Y=66

[meterLine2]
Meter=String
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE4#
Text=DAY#CRLF#SPND
X=110
Y=34

[arrow1]
Meter=String
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE3#
Text=<-----
X=65
Y=34

[arrow2]
Meter=String
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE5#
Text=<--
X=85
Y=66
