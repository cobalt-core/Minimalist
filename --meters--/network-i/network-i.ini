[Rainmeter]
Update=1000

[Metadata]
Name=Network One
Author=cobalt-core
Information=Adapter details.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[Measure1]
Measure=SysInfo
SysInfoType=ADAPTER_TYPE
SysInfoData=Best

[Measure3]
Measure=SysInfo
SysInfoType=ADAPTER_DESCRIPTION
SysInfoData=Best

[Measure2]
Measure=SysInfo
SysInfoType=ADAPTER_ALIAS
SysInfoData=Best

[Measure4]
Measure=SysInfo
SysInfoType=ADAPTER_STATUS
SysInfoData=Best

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,190,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,190,120 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,190,120 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: adapter info

[meterLine]
Meter=String
MeterStyle=styleText
X=10
Y=38
W=225
H=175
FontColor=#PALETTE3#
FontSize=6
Text=Adapter Type - #CRLF##CRLF#Alias -#CRLF##CRLF#Desc. - #CRLF##CRLF##CRLF##CRLF#Status -

[meter1]
Meter=String
MeterStyle=styleText
MeasureName=Measure1
X=99
Y=38
FontColor=#PALETTE4#
FontSize=6
Text=
MouseOverAction=[!SetOption meter1 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption meter1 FontColor #PALETTE4#]

[meter2]
Meter=String
MeterStyle=styleText
MeasureName=Measure2
X=52
Y=54
W=130
H=90
FontColor=#PALETTE4#
FontSize=6
Text=
MouseOverAction=[!SetOption meter2 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption meter2 FontColor #PALETTE4#]

[meter3]
Meter=String
MeterStyle=styleText
MeasureName=Measure3
X=52
Y=69
W=130
H=90
FontColor=#PALETTE4#
FontSize=6
Text=
MouseOverAction=[!SetOption meter3 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption meter3 FontColor #PALETTE4#]

[meter4]
Meter=String
MeterStyle=styleText
MeasureName=Measure4
X=62
Y=102
W=130
H=90
FontColor=#PALETTE4#
FontSize=6
Text=
MouseOverAction=[!SetOption meter4 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption meter4 FontColor #PALETTE4#]
