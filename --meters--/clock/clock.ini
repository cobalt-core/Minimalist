[Rainmeter]
Update=1000

[Metadata]
Name=Clock
Author=cobalt-core
Information=Shows time.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,99,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,99,179 | Fill Color #PALETTE2#,200
[Outline]
Meter=Shape
Shape=Rectangle 1,1,99,179 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: time

[Hours]
Measure=Time
Format=%I

[Minutes]
Measure=Time
Format=%M

[AMPM]
Measure=Time
Format=%p

[StrHours]
Meter=String
MeasureName=Hours
FontFace=pixelmix
FontSize=35
AntiAlias=1
FontColor=#PALETTE5#
MouseOverAction=[!SetOption StrHours FontColor #PALETTE4#]
LeftMouseUpAction=[!SetOption StrHours FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption StrHours FontColor #PALETTE7#]
X=95
Y=70
StringAlign=RightCenter

[StrMinutes]
Meter=String
MeasureName=Minutes
FontFace=pixelmix
FontSize=35
AntiAlias=1
X=11
Y=120
FontColor=#PALETTE5#
MouseOverAction=[!SetOption StrMinutes FontColor #PALETTE4#]
LeftMouseOver=[!SetOption StrMinutes FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption StrMinutes FontColor #PALETTE7#]
StringAlign=LeftCenter

[StrAMPM]
Meter=String
MeasureName=AMPM
FontFace=pixelmix
FontSize=18
AntiAlias=1
FontColor=#PALETTE3#
X=42
Y=160
FontColor=#PALETTE4#
StringAlign=LeftCenter

[TitleBar2]
Meter=Shape
Shape=Rectangle 106,5,20,25 | Fill Color #PALETTE1#,252 

[Fill2]
Meter=Shape
Shape=Rectangle 106,5,20,110 | Fill Color #PALETTE2#,200

[Outline2]
Meter=Shape
Shape=Rectangle 106,5,20,110 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle2]
Meter=String
MeterStyle=styleTitle
X=112
Y=15
W=400
H=18
FontSize=4
Text=   X
