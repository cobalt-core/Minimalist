[Rainmeter]
Update=1000

[Metadata]
Name=Mail
Author=cobalt-core
Information=Open GMail in your default browser.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Center
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,90,20 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,120,49 | Fill Color #PALETTE2#,200
[Outline]
Meter=Shape
Shape=Rectangle 1,1,120,49 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=8
Y=8
W=400
H=18
FontSize=6
Text=  X _
ToolTipText=:: gmail

[Measure]
Meter=String
MeterStyle=styleText
X=60
Y=30
W=225
H=175
FontColor=#PALETTE4#
FontSize=6
FontFace=#FACE1#
Text=compose a letter
MouseOverAction=[!SetOption Measure FontColor #PALETTE5#]
LeftMouseUpAction=["https://mail.google.com/mail/]
MouseLeaveAction=[!SetOption Measure FontColor #PALETTE4#]
