[Rainmeter]
Update=1000

[Metadata]
Name=Notes
Author=cobalt-core
Information=Write notes. When the skin/app is refreshed it clears itself.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE7#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,235,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,235,175 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,235,175 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: sticky notes (temporary)

[meterLine]
Meter=String
MeterStyle=styleText
X=10
Y=52
W=225
H=175
FontColor=#PALETTE6#
FontSize=6
Text=>#CRLF##CRLF#>#CRLF##CRLF#>#CRLF##CRLF#>#CRLF##CRLF#>#CRLF##CRLF#>#CRLF##CRLF#>#CRLF##CRLF#

[meterNotes1]
Meter=String
MeterStyle=styleText
X=20
Y=52
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=THIS automation stores text
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 1"]
ToolTipText=i

[meterNotes2]
Meter=String
MeterStyle=styleText
X=20
Y=68
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=as in form of a LIST
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 2"]
ToolTipText=ii

[meterNotes3]
Meter=String
MeterStyle=styleText
X=20
Y=86
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=which IS enterd by the user.
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 3"]
ToolTipText=iii

[meterNotes4]
Meter=String
MeterStyle=styleText
X=20
Y=102
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=This's CURRENTLY lacking some text,
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 4"]
ToolTipText=iv

[meterNotes5]
Meter=String
MeterStyle=styleText
X=20
Y=118
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=hence the temporary data is EMPTY
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 5"]
ToolTipText=v

[meterNotes6]
Meter=String
MeterStyle=styleText
X=20
Y=134
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=LEFT-CLICK to enter text which's
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 6"]
ToolTipText=vi

[meterNotes7]
Meter=String
MeterStyle=styleText
X=20
Y=150
W=225
H=175
FontColor=#PALETTE5#
FontSize=6
Text=STORED for a short time in the RAM
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 7"]
ToolTipText=vii

[meterLine1]
Meter=String
MeterStyle=styleText
X=20
Y=130
W=225
H=175
FontColor=255,174,69,255
FontSize=7
Text=

[meterLine2]
Meter=String
MeterStyle=styleText
X=20
Y=145
W=225
H=175
FontColor=255,217,120,255
FontSize=7
Text=

[measureInput]
Measure=Plugin
Plugin=InputText.dll
FontColor=#PALETTE5#
FontFace=#FACE2#
FontSize=9
SolidColor=#PALETTE1#,256
X=65
Y=12
W=170
H=17
InputLimit=19
FocusDismiss=1
DefaultValue=""
StringStyle=Bold
StringAlign=Center
Command1=[!SetOption meterNotes1 Text "$UserInput$"]
Command2=[!SetOption meterNotes2 Text "$UserInput$"]
Command3=[!SetOption meterNotes3 Text "$UserInput$"]
Command4=[!SetOption meterNotes4 Text "$UserInput$"]
Command5=[!SetOption meterNotes5 Text "$UserInput$"]
Command6=[!SetOption meterNotes6 Text "$UserInput$"]
Command7=[!SetOption meterNotes7 Text "$UserInput$"]
UpdateDivider=86400
