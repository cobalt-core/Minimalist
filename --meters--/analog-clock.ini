[Rainmeter]
Update=1000

[Metadata]
Name=Analog Clock
Author=cobalt-core
Information=An analog clock, it also shows your pc's timezone and daylight zone.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,230,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,230,70 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,230,70 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: analog clock

[MeasureTime]
Measure=Time

[Circle]
Meter=Shape
Shape=Ellipse 195,37,30 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE7#

[MeterSeconds]
MeasureName=MeasureTime
Meter=Roundline
X=140
Y=-20
W=110
H=116
LineLength=30
LineColor=#PALETTE5#
LineWidth=1
AntiAlias=1
StartAngle=4.7124
RotationAngle=6.2832
ValueRemainder=60

[MeterMins]
MeasureName=MeasureTime
Meter=Roundline
X=140
Y=-20
W=110
H=116
LineLength=25
LineColor=#PALETTE3#
LineWidth=2
AntiAlias=1
StartAngle=4.7124
RotationAngle=6.2832
ValueRemainder=3600

[MeterHours]
MeasureName=MeasureTime
Meter=Roundline
X=140
Y=-20
W=110
H=116
LineLength=17
LineColor=#PALETTE4#
LineWidth=3
AntiAlias=1
StartAngle=4.7124
RotationAngle=6.2832
ValueRemainder=43200

[MeasureZONE]
Measure=SysInfo
SysInfoType=TIMEZONE_STANDARD_NAME

[meterZONE]
Meter=String
MeasureName=MeasureZONE
MeterStyle=styleText
X=10
Y=37
W=225
H=175
FontColor=#PALETTE4#
FontSize=6
Text=

[Measure2]
Measure=SysInfo
SysInfoType=TIMEZONE_DAYLIGHT_NAME
SysInfoData=Best

[meter2]
Meter=String
MeasureName=Measure2
MeterStyle=styleText
X=10
Y=50
W=225
H=175
FontColor=#PALETTE4#
FontSize=6
Text=

