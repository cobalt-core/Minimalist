[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=Bin
Author=cobalt-core
Information=Shows recycle bin stats. Left click to empty bin.
Version=1.0.0
License=Creative Commons BY-NC-SA 3.0

[Variables]
@Include=#@#one.inc

[MeasureSize]
Measure=RecycleManager
RecycleType=Size
UpdateDivider=5

[MeterBSize]
Meter=String
MeasureName=MeasureSize
X=5
Y=5
W=200
H=20
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE4#
AutoScale=1
Text=Bin size: %1B
LeftMouseUpAction=!CommandMeasure MeasureSize OpenBin
