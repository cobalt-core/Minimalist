[Rainmeter]
Update=1000

[Metadata]
Name=Day Percentage
Author=cobalt-core
Information=Shows how much of the day you've spend.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[MeasureHours]
Measure=Time
Format=%H

[MeasureMinutes]
Measure=Time
Format=%M

[MeasureSeconds]
Measure=Time
Format=%S

[MeasureTotalSeconds]
Measure=Calc
Formula=(MeasureHours*3600)+(MeasureMinutes*60)+(MeasureSeconds)

[MeasureInPercent]
Measure=Calc
Formula=(MeasureTotalSeconds/86400)

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,135,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,135,59 | Fill Color #PALETTE2#,200
[Outline]
Meter=Shape
Shape=Rectangle 1,1,135,59 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: shows percent of day left

[MeasureTimer]
Meter=String
MeterStyle=styleText
MeasureName=MeasureInPercent
X=10
Y=42
W=225
H=175
FontColor=#PALETTE4#
FontSize=7
Text="day spend: %1 % "
NumOfDecimals=2
Percentual=1
AntiAlias=1
MouseOverAction=[!SetOption MeasureTimer FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption MeasureTimer FontColor #PALETTE4#]
