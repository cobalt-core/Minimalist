[Rainmeter]
Update=1000
DynamicWindowSize=1

[Metadata]
Name=Month & Year
Author=cobalt-core
Information=Displays month and year.
Version=1.0.0
License=Creative Commons BY-NC-SA 3.0

[Variables]
@Include=#@#one.inc

[Month]
Measure=Time
Format=%B

[DayDate]
Measure=Time
Format=%#d

[Year]
Measure=Time
Format=%Y

[TextStyle]
FontFace=#FACE2#
FontColor=#PALETTE4#
SolidColor=0,0,0,1
StringStyle=Light
StringAlign=Right
StringCase=Upper
AntiAlias=1
InlineSetting=CharacterSpacing | 1 | 1

[Meter]
Meter=String
MeterStyle=TextStyle
MeasureName=Month
MeasureName2=DayDate
MeasureName3=Year
X=450
Y=0R
FontSize=10
Text=%1 %2, %3
