[Rainmeter]
Update=1000

[Metadata]
Name=Network Two
Author=cobalt-core
Information=Adapter speed in bits/second.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[Measure1]
Measure=SysInfo
SysInfoType=ADAPTER_TRANSMIT_SPEED
AutoScale=2

[Measure2]
Measure=SysInfo
SysInfoType=ADAPTER_RECEIVE_SPEED
AutoScale=2

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,190,15 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,190,40 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,190,40 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=7
W=400
H=18
FontSize=4
Text=  X _
ToolTipText=:: adapter info

[meterLine]
Meter=String
MeterStyle=styleText
X=6
Y=20
W=225
H=175
FontColor=#PALETTE3#
FontSize=6
Text=Transmit spd [b/s] - #CRLF#Recieve spd [b/s] -

[meter1]
Meter=String
MeterStyle=styleText
MeasureName=Measure1
X=122
Y=20
FontColor=#PALETTE4#
FontSize=6
Text=

[meter2]
Meter=String
MeterStyle=styleText
MeasureName=Measure2
X=114
Y=30
W=130
H=90
FontColor=#PALETTE4#
FontSize=6
Text=
