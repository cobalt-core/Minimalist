[Rainmeter]
Update=1000
BackgroundMode=2
SolidColor=0,0,0,0

[Metadata]
Name=WiFi
Author=cobalt-core
Information=Shows wifi stats // up & down
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[MeasureNetIn]
Measure=NetIn

[MeasureNetOut]
Measure=NetOut

[MeterText]
Meter=String
MeasureName=MeasureNetIn
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE4#
NumOfDecimals=1
AutoScale=1
Text="I: %1B"

[MeterText2]
Meter=String
MeasureName=MeasureNetOut
x=60
FontSize=7
FontFace=#FACE1#
FontColor=#PALETTE4#
NumOfDecimals=1
AutoScale=1
Text="O: %1B"
