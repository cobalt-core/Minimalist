[Rainmeter]
Update=1000

[Metadata]
Name=Digital Clock
Information=Another clock.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,173,15 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,173,40 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,173,40 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=8
Y=6
W=400
H=18
FontSize=4
Text=  X _
ToolTipText=:: digital clock

[MeasureTimmy]
Measure=Time
Format=%I : %M : %S

[meterTimmy]
Meter=String
MeasureName=MeasureTimmy
MeterStyle=styleText
X=13
Y=19
W=225
H=175
FontColor=#PALETTE3#
FontSize=10
Text=

[MeasureTim]
Measure=Time
Format=%p

[meterTim]
Meter=String
MeasureName=MeasureTim
MeterStyle=styleText
X=123
Y=18
W=225
H=175
FontColor=#PALETTE4#
FontSize=7
Text=

[Heart]
Meter=String
MeterStyle=styleText
X=145
Y=21
W=225
H=175
FontColor=#PALETTE5#
FontSize=9
Text=<3
