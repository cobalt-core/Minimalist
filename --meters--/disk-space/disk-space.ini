[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=Disk Space
Author=cobalt-core
Information=Displays disk space for upto 4 disks.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc
disk1=C:
disk2=D:
disk3=F:
disk4=G:

[TitleBar]
Meter=Shape
Shape=Rectangle 20,1,220,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 20,1,220,120 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 20,1,220,120 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=7
AntiAlias=1
ClipString=1

[styleRightText]
StringAlign=Right
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=7
AntiAlias=1
ClipString=1

[styleBar]
BarColor=#PALETTE7#
BarOrientation=HORIZONTAL
SolidColor=255,255,255,15

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=28
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: disk space

[measureTotalDisk1]
Measure=FreeDiskSpace
Drive=#disk1#
Total=1
UpdateDivider=120

[measureUsedDisk1]
Measure=FreeDiskSpace
Drive=#disk1#
InvertMeasure=1
UpdateDivider=120

[measureTotalDisk2]
Measure=FreeDiskSpace
Drive=#disk2#
Total=1
UpdateDivider=120

[measureUsedDisk2]
Measure=FreeDiskSpace
Drive=#disk2#
InvertMeasure=1
UpdateDivider=120

[measureTotalDisk3]
Measure=FreeDiskSpace
Drive=#disk3#
Total=1
UpdateDivider=120

[measureUsedDisk3]
Measure=FreeDiskSpace
Drive=#disk3#
InvertMeasure=1
UpdateDivider=120

[measureTotalDisk4]
Measure=FreeDiskSpace
Drive=#disk4#
Total=1
UpdateDivider=120

[measureUsedDisk4]
Measure=FreeDiskSpace
Drive=#disk4#
InvertMeasure=1
UpdateDivider=120

[meterLabelDisk1]
Meter=String
MeterStyle=styleLeftText
X=26
Y=40
W=190
H=14
FontColor=#PALETTE3#
Text=#disk1#\

[meterValueDisk1]
Meter=String
MeterStyle=styleLeftText
MeasureName=measureUsedDisk1
MeasureName2=measureTotalDisk1
X=100
Y=0r
W=190
H=14
FontColor=#PALETTE4#
Text=%1B/%2B used
NumOfDecimals=1
AutoScale=1
LeftMouseUpAction=["#disk1#\"]
MouseOverAction=[!SetOption MeterValueDisk1 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption MeterValueDisk1 FontColor #PALETTE4#]

[meterBarDisk1]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureUsedDisk1
X=26
Y=54
W=210
H=2

[meterLabelDisk2]
Meter=String
MeterStyle=styleLeftText
X=26
Y=60
W=190
H=14
FontColor=#PALETTE3#
Text=#disk2#\

[meterValueDisk2]
Meter=String
MeterStyle=styleLeftText
MeasureName=measureUsedDisk2
MeasureName2=measureTotalDisk2
X=110
Y=0r
W=190
H=14
FontColor=#PALETTE4#
Text=%1B/%2B used
NumOfDecimals=1
AutoScale=1
LeftMouseUpAction=["#disk2#\"]
MouseOverAction=[!SetOption MeterValueDisk2 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption MeterValueDisk2 FontColor #PALETTE4#]

[meterBarDisk2]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureUsedDisk2
X=26
Y=74
W=210
H=2

[meterLabelDisk3]
Meter=String
MeterStyle=styleLeftText
X=26
Y=80
W=190
H=14
FontColor=#PALETTE3#
Text=#disk3#\

[meterValueDisk3]
Meter=String
MeterStyle=styleLeftText
MeasureName=measureUsedDisk3
MeasureName2=measureTotalDisk3
X=110
Y=0r
W=190
H=14
FontColor=#PALETTE4#
Text=%1B/%2B used
NumOfDecimals=1
AutoScale=1
LeftMouseUpAction=["#disk3#\"]
MouseOverAction=[!SetOption MeterValueDisk3 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption MeterValueDisk3 FontColor #PALETTE4#]

[meterBarDisk3]
