H=2

[meterLabelDisk4]
Meter=String
MeterStyle=styleLeftText
X=26
Y=100
W=190
H=14
FontColor=#PALETTE3#
Text=#disk4#\

[meterValueDisk4]
Meter=String
MeterStyle=styleLeftText
MeasureName=measureUsedDisk4
MeasureName2=measureTotalDisk4
X=110
Y=0r
W=190
H=14
FontColor=#PALETTE4#
Text=%1B/%2B used
NumOfDecimals=1
AutoScale=1
LeftMouseUpAction=["#disk4#\"]
MouseOverAction=[!SetOption MeterValueDisk4 FontColor #PALETTE5#]
