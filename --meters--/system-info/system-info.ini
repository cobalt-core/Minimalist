[Rainmeter]
Update=1000
AccurateText=1

[Metadata]
Name=System Info
Author=cobalt-core
Information=Displays CPU, RAM & SWAP stats
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[TitleBar]
Meter=Shape
Shape=Rectangle 20,1,220,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 20,1,220,100 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 20,1,220,100 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[measureCPU]
Measure=CPU
Processor=0

[measureRAM]
Measure=PhysicalMemory
UpdateDivider=20

[measureSWAP]
Measure=SwapMemory
UpdateDivider=20

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=7
AntiAlias=1
ClipString=1

[styleRightText]
StringAlign=Right
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=7
AntiAlias=1
ClipString=1

[styleBar]
BarColor=#PALETTE7#
BarOrientation=HORIZONTAL
SolidColor=255,255,255,15

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=28
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: system info

[meterLabelCPU]
Meter=String
MeterStyle=styleLeftText
X=25
Y=40
W=190
H=14
Text=CPU Usage

[meterValueCPU]
Meter=String
MeterStyle=styleRightText
MeasureName=measureCPU
X=230
Y=0r
W=190
H=14
Text=%1%

[meterBarCPU]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureCPU
X=25
Y=52
W=190
H=1

[meterLabelRAM]
Meter=String
MeterStyle=styleLeftText
X=25
Y=60
W=190
H=14
Text=RAM Usage

[meterValueRAM]
Meter=String
MeterStyle=styleRightText
MeasureName=measureRAM
X=230
Y=0r
W=190
H=14
Text=%1%
Percentual=1

[meterBarRAM]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureRAM
X=25
Y=72
W=190
H=1

[meterLabelSWAP]
Meter=String
MeterStyle=styleLeftText
X=25
Y=80
W=190
H=14
Text=SWAP Usage

[meterValueSWAP]
Meter=String
MeterStyle=styleRightText
MeasureName=measureSWAP
X=230
Y=0r
W=190
H=14
Text=%1%
Percentual=1

[meterBarSWAP]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureSWAP
X=25
Y=92
W=190
H=1
