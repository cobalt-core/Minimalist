[Rainmeter]
Update=1000
DynamicWindowSize=1

[Metadata]
Name=Day
Author=cobalt-core
Information=Shows the day.
Version=1.0.0
License=Creative Commons BY-NC-SA 3.0

[Variables]
@Include=#@#one.inc

[TextStyle]
FontFace=#FACE2#
FontColor=#PALETTE4#
StringStyle=Bold
StringAlign=Center
StringCase=Upper
AntiAlias=1

[Day]
Measure=Time
Format=%A

[MeterDay]
Meter=String
MeterStyle=TextStyle
MeasureName=Day
X=300
Y=17
W=250
FontSize=20
Text=

[MeterEffect]
Meter=String
MeterStyle=TextStyle
MeasureName=Day
X=300
Y=19
W=250
FontSize=20
FontColor=#PALETTE3#
