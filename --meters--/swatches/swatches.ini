[Rainmeter]
Update=1000

[Metadata]
Name=Swatches
Author=cobalt-core
Information=Squares.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[PALETTE1]
Meter=Shape
Shape=Rectangle 1,1,15,15 | Fill Color #PALETTE1#,255 | Stroke Width 4 | Stroke Color #PALETTE3#
Hidden=0
MouseOverAction=[!SetOption InfoFill Hidden 0][!SetOption InfoText Hidden 0]
MouseLeaveAction=[!SetOption InfoFill Hidden 1][!SetOption InfoText Hidden 1]

