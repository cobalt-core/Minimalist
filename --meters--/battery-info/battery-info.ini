[Rainmeter]
Update=1000

[Metadata]
Name=Battery
Author=cobalt-core
Information=This shows details regrading your pc's battery. Shows percentage, battery status and whether you are on battery or charging.
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[MeasureTime]
Measure=Time

[MeasureTim]
Measure=SysInfo
SysInfoType=IDLE_TIME

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,130,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,130,250 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,130,250 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _
ToolTipText=:: battery info

[Text]
Meter=String
MeterStyle=styleText
X=5
Y=40
W=140
H=175
FontColor=#PALETTE4#
FontSize=6
FontFace=#FACE1#
Text=POWER#CRLF#PERCENT:#CRLF##CRLF##CRLF##CRLF##CRLF##CRLF#IS WHAT WE DEPEND ON#CRLF##CRLF#&#CRLF##CRLF#YET BATTERY SAVER RECOMMENDED 

[1]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent

[Measure]
Meter=String
MeterStyle=styleText
MeasureName=1
X=60
Y=40
W=225
H=175
FontColor=#PALETTE3#
FontSize=28
FontFace=#FACE1#
Text=
MouseOverAction=[!SetOption Measure FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption Measure FontColor #PALETTE3#]

[2]
Measure=Plugin
Plugin=PowerPlugin
PowerState=ACLine
Substitute="0":"Power","1":"A/C ON"

[Measure2]
Meter=String
MeterStyle=styleText
MeasureName=2
X=3
Y=82
W=225
H=175
FontColor=#PALETTE3#
FontSize=9
FontFace=#FACE1#
Text=
MouseOverAction=[!SetOption Measure2 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption Measure2 FontColor #PALETTE3#]

[3]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Status
Substitute="0":"No battery","1":"Charging","2":"Critical","3":"Low Charge","4":"High Charge"

[Measure3]
Meter=String
MeterStyle=styleText
MeasureName=3
X=26
Y=111
W=225
H=175
FontColor=#PALETTE3#
FontSize=9
FontFace=#FACE1#
Text=
MouseOverAction=[!SetOption Measure3 FontColor #PALETTE5#]
MouseLeaveAction=[!SetOption Measure3 FontColor #PALETTE3#]

[Circle]
Meter=Shape
Shape=Ellipse 40,187,30 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE7#

[MeterArrows]
MeasureName=MeasureTime
Meter=Roundline
X=-15
Y=130
W=110
H=116
LineLength=30
LineColor=#PALETTE5#
LineWidth=1
AntiAlias=1
StartAngle=0
RotationAngle=36
ValueRemainder=60

[Circle2]
Meter=Shape
Shape=Ellipse 100,167,20 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE7#

[MeterArrows2]
MeasureName=MeasureTime
Meter=Roundline
X=45
Y=110
W=110
H=116
LineLength=20
LineColor=#PALETTE5#
LineWidth=1
AntiAlias=1
StartAngle=180
RotationAngle=12
ValueRemainder=3

[Circle3]
Meter=Shape
Shape=Ellipse 100,217,20 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE7#

[MeterArrows3]
MeasureName=MeasureTime
Meter=Roundline
X=45
Y=160
W=110
H=116
LineLength=20
LineColor=#PALETTE5#
LineWidth=1
AntiAlias=1
StartAngle=-180
RotationAngle=12
ValueRemainder=3

[meterBar]
Meter=Bar
MeasureName=MeasureTim
X=35
Y=236
H=10
W=10
BarColor=880f18
BarOrientation=Vertical
SolidColor=385e45

[meterBar2]
Meter=Bar
MeasureName=MeasureTim
X=60
Y=236
H=10
W=10
BarColor=880f18
BarOrientation=Vertical
SolidColor=385e45

[meterBar3]
Meter=Bar
MeasureName=MeasureTim
X=10
Y=236
H=10
W=10
BarColor=880f18
BarOrientation=Vertical
SolidColor=385e45
