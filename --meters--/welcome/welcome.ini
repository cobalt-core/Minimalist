[Rainmeter]
Update=1000

[Metadata]
Name=Welcome
Author=cobalt-core
Information=Shortcuts
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
@Include=#@#one.inc

[styleTitle]
StringAlign=Left
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=10
AntiAlias=1
ClipString=1

[styleMain]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE4#
FontFace=#FACE1#
FontSize=6
AntiAlias=1
ClipString=1

[TitleBar]
Meter=Shape
Shape=Rectangle 1,1,200,30 | Fill Color #PALETTE1#,252 

[Fill]
Meter=Shape
Shape=Rectangle 1,1,200,79 | Fill Color #PALETTE2#,200

[Outline]
Meter=Shape
Shape=Rectangle 1,1,200,79 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE3#

[meterTitle]
Meter=String
MeterStyle=styleTitle
StringCase=None
X=10
Y=12
W=400
H=18
FontSize=7
Text=  X _            
ToolTipText=:: dashboard

[meterLine]
Meter=String
MeterStyle=styleMain
X=10
Y=44
W=225
H=175
FontColor=#PALETTE5#
FontSize=5
Text=greetings,

[MeasureUserName]
Measure=SysInfo
SysInfoType=USER_NAME

[meterLine2]
Meter=String
MeasureName=MeasureUserName
X=10
Y=54
W=225
H=175
FontColor=#PALETTE3#
FontSize=10
FontFace=#FACE1#

[Start]
Meter=String
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#PALETTE5#
FontFace=#FACE2#
AntiAlias=1
ClipString=1
X=92
Y=54
W=225
H=175
FontSize=12
Text=S
LeftMouseDownAction=["#@#nircmd.exe" sendkeypress lwin]
DynamicVariables=1

[StartCircle]
Meter=Shape
Shape=Ellipse 99.4,62,10 | Fill Color 0,0,0,0 | Stroke Width 4 | Stroke Color #PALETTE6#

[ThemeInfo]
Meter=String
